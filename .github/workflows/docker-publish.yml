# Builds the SimpleSAMLphp IdP image (root Dockerfile) and pushes it to GHCR as
# ghcr.io/ubc/docker-simple-saml, authenticated with the workflow's own
# GITHUB_TOKEN (no extra secrets). Mirrors lms-safe-mode's
# lifeboat-docker-publish job and ubc/FakeAcademicAPI's docker-publish.
#
# One-time after the first publish: set the package's visibility to PUBLIC in
# GitHub package settings so it can be pulled without an imagePullSecret
# (same arrangement as ghcr.io/ubc/ipeer-ng).
name: docker-publish

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            # "main" is the moving latest; deployments may track it or pin a sha- tag
            type=ref,event=branch
            type=raw,value=sha-${{ github.sha }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
